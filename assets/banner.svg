<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#1c1c1f" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />
  
  <!-- Angled planes for structural aesthetic -->
  <polygon points="-100,400 400,-100 800,-100 100,400" fill="#151518" />
  <polygon points="500,450 1300,-50 1400,-50 600,450" fill="#111114" />
  
  <!-- Sharp accent color cutting across -->
  <polygon points="-50,200 1300,50 1300,55 -50,205" fill="#c0392b" />
  
  <!-- Name plate -->
  <rect x="100" y="240" width="600" height="80" fill="#0a0a0c" stroke="#333" stroke-width="1" />
  <text x="140" y="290" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="32" font-weight="600" fill="#ffffff" letter-spacing="8">FATIMA UMAR</text>
  <text x="145" y="340" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14" font-weight="400" fill="#888888" letter-spacing="4">FOUNDER · LENS VAULT</text>
  
  <!-- Red accent block on the name plate -->
  <rect x="100" y="240" width="8" height="80" fill="#c0392b" />
</svg>
